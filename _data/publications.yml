- id: WeightedPointedCurves
  title: "Weighted Syzygies of Pointed Curves"
  year: 2026
  venue: In Preparation
  authors:
    - Maya Banks
    - John Cobb
    - Mahrud Sayrafi
  description: 'Let $C$ be a smooth curve and $P\in C$ a point. We give precise and combinatorial descriptions of the betti tables for the section ring $R_d = R(C,\mathcal{O}_C(dP))$ in terms of the Weierstrass semigroup of $P$.'
  tags: 
    - Syzygies
    - Algebraic Geometry
  type: In Progress
- id: NonsimplicialSplines
