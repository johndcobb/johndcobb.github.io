- id: FloquetIsospectrality
  title: "Inverse Eigenvalue Problems, Floquet Isospectrality and the Hilbert-Chow Morphism"
  year: 2026
  venue: Submitted
  pdf: "https://arxiv.org/pdf/2601.09604"
  arxiv: '2601.09604'
  authors:
    - John Cobb
    - Matthew Faust
    - Andreas Kretschmer
  description: 'When can you change the diagonal of a matrix without changing its spectrum? Using deformation theory, we determine a square matrix $A$ admits a nonzero diagonal matrix $D$ such that $A$ and $A+D$ have the same spectrum if and only if $A$ has two principal minors of the same size that are not equal. This yields a new result about the spectral theory of discrete periodic Schrödinger operators.'
  tags: 
    - Mathematical Physics
    - Algebraic Geometry
    - Spectral Theory
  highlight: true
  type: Preprint

- id: ParametricGradients
  title: 'Elimination Without Eliminating: Computing Complements of Real Hypersurfaces Using Pseudo-Witness Sets'
  year: 2026
  venue: Submitted
  pdf: https://arxiv.org/pdf/2601.04383
  arxiv: "2601.04383"
  authors:
    - Paul Breiding
    - John Cobb
    - Aviva K. Englander
    - Nayda J. Farnsworth
    - Jonathon D. Hauenstein
    - Oskar Henriksson
    - David K. Johnson
    - Jordy Lopez Garcia
    - Deepak Mundayur
  description: Complements of real hypersurfaces arise naturally in applications -- for example, the complement of the real discriminant of a polynomial system can tell you how many real solutions the system has. We develop a new numerical method for computing this complement even without a symbolic representation for the hypersurface.
  tags:
    - Numerical Algebraic Geometry
    - Homotopy Continuation
  type: Preprint

- id: MultigradedStillman
  title: Semigroup Graded Stillman's Conjecture
  year: 2025
  authors:
    - John Cobb
    - Nathaniel Gallup
    - John Spoerl
  venue: Journal of Algebra
  venue_tags:
    - J. Algebra
  doi: 10.1016/j.jalgebra.2025.02.016
  short_doi: 10/n9nt
  venue_url: https://www.sciencedirect.com/journal/journal-of-algebra
  pdf: https://arxiv.org/pdf/2406.09593
  arxiv: "2406.09593"
  highlight: true 
  description: In 2000, Mike Stillman conjectured that the projective dimension of a homogeneous ideal in a standard graded polynomial ring can be bounded just in terms of the number and degrees of the generators. We resolve Stillman's conjecture for families of polynomial rings that are graded by any abelian group under mild conditions. Conversely, we show that these conditions are necessary for the existence of a Stillman bound. 
  tags: 
    - Syzygies
    - Toric Varieties
    - Commutative Algebra
  type: Journal

